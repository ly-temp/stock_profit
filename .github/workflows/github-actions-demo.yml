on: push
  #schedule:
  #- cron:  '30 * * * *'
  #- cron:  '0 1-13 * * 1-5'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          mkdir -p log
          TZ='Asia/Hong_kong' date >> log/log.txt
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add log
          git commit -m "github action"
          git push
